name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check src/ scripts/ tests/ --fix
    
    - name: Format check with black
      run: |
        pip install black
        black --check src/ scripts/ tests/
    
    - name: Test with pytest
      run: |
        pytest tests/ -v --cov=src --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create toy dataset
      run: |
        python -c "from src.data.dataset import create_toy_dataset; create_toy_dataset('./data/toy_dataset', num_classes=3, samples_per_class=50)"
    
    - name: Test training script
      run: |
        python scripts/train.py --config configs/default.yaml --data_path ./data/toy_dataset --output_dir ./test_outputs
      timeout-minutes: 10
    
    - name: Test sampling script
      run: |
        python scripts/sample.py --model_path ./checkpoints/few-shot-gen-last.ckpt --num_samples 4 --output_dir ./test_samples
      timeout-minutes: 5
      continue-on-error: true  # May fail if no checkpoint exists
    
    - name: Upload test artifacts
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-outputs
        path: |
          test_outputs/
          test_samples/
        retention-days: 1
